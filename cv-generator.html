<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CV Studio — Professional CV Generator</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
/* ═══════════════════════════════════════════════
   ROOT & RESET
═══════════════════════════════════════════════ */
:root {
  --ink:        #0c0f14;
  --ink-2:      #1a1f2e;
  --ink-3:      #2d3548;
  --slate:      #4a5568;
  --muted:      #8892a4;
  --border:     #e4e8f0;
  --border-2:   #f0f3f8;
  --surface:    #f7f9fc;
  --white:      #ffffff;
  --gold:       #b8973a;
  --gold-light: #d4af6a;
  --gold-pale:  #fdf6e3;
  --accent:     #1a3a5c;
  --accent-2:   #245280;
  --accent-3:   #3a6fa0;
  --accent-pale:#eef4fb;
  --red:        #c0392b;
  --green:      #1a6b4a;
  --font-serif: 'Cormorant Garamond', Georgia, serif;
  --font-body:  'DM Sans', system-ui, sans-serif;
  --font-mono:  'DM Mono', monospace;
  --r:          10px;
  --r-lg:       16px;
  --sh-sm:      0 1px 4px rgba(12,15,20,.06), 0 2px 12px rgba(12,15,20,.04);
  --sh-md:      0 4px 16px rgba(12,15,20,.08), 0 8px 32px rgba(12,15,20,.06);
  --sh-lg:      0 8px 32px rgba(12,15,20,.12), 0 24px 64px rgba(12,15,20,.10);
  --sh-xl:      0 16px 48px rgba(12,15,20,.16), 0 40px 96px rgba(12,15,20,.12);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
body {
  font-family: var(--font-body);
  background: #eceff5;
  color: var(--ink);
  min-height: 100vh;
  font-size: 14px;
  line-height: 1.6;
}

/* ═══════════════════════════════════════════════
   TOPBAR
═══════════════════════════════════════════════ */
.topbar {
  height: 54px;
  background: var(--ink-2);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 28px;
  position: sticky; top: 0; z-index: 100;
  border-bottom: 1px solid rgba(255,255,255,.06);
}
.topbar-brand {
  display: flex; align-items: center; gap: 12px;
}
.topbar-logo {
  width: 30px; height: 30px;
  background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
  border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-serif);
  font-size: 1rem; font-weight: 700; color: var(--ink-2);
  letter-spacing: -0.5px;
}
.topbar-title {
  font-family: var(--font-serif);
  font-size: 1.1rem; font-weight: 500;
  color: var(--white);
  letter-spacing: 0.3px;
}
.topbar-title span { color: var(--gold-light); }
.topbar-meta {
  font-size: 0.72rem; color: rgba(255,255,255,.35);
  font-weight: 300; letter-spacing: 0.3px;
}
.topbar-actions { display: flex; gap: 8px; }
.tbtn {
  height: 32px; padding: 0 14px;
  border-radius: 6px; border: none;
  font-family: var(--font-body); font-size: 0.75rem; font-weight: 500;
  cursor: pointer; transition: all .2s; display: flex; align-items: center; gap: 6px;
}
.tbtn-ghost { background: rgba(255,255,255,.08); color: rgba(255,255,255,.7); }
.tbtn-ghost:hover { background: rgba(255,255,255,.14); color: white; }
.tbtn-gold {
  background: linear-gradient(135deg, var(--gold), var(--gold-light));
  color: var(--ink-2); font-weight: 600;
}
.tbtn-gold:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(184,151,58,.4); }

/* ═══════════════════════════════════════════════
   LAYOUT
═══════════════════════════════════════════════ */
.app-layout { display: flex; height: calc(100vh - 54px); overflow: hidden; }

/* ═══════════════════════════════════════════════
   LEFT PANEL — CONTROLS
═══════════════════════════════════════════════ */
.ctrl-panel {
  width: 360px; min-width: 320px;
  background: var(--white);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow: hidden;
}
.ctrl-panel-inner {
  flex: 1; overflow-y: auto;
  padding-bottom: 100px;
}
.ctrl-panel-inner::-webkit-scrollbar { width: 3px; }
.ctrl-panel-inner::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

/* Panel section */
.ps {
  padding: 20px 22px;
  border-bottom: 1px solid var(--border-2);
}
.ps-label {
  font-size: 0.65rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: 1.2px;
  color: var(--muted); margin-bottom: 12px;
  display: flex; align-items: center; gap: 7px;
}
.ps-label::after { content:''; flex:1; height:1px; background: var(--border-2); }

/* Template cards */
.tpl-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.tpl-card {
  border: 2px solid var(--border);
  border-radius: var(--r); padding: 10px 6px 8px;
  text-align: center; cursor: pointer;
  transition: all .2s; background: var(--surface);
  position: relative; overflow: hidden;
}
.tpl-card::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, var(--accent-pale), transparent);
  opacity: 0; transition: opacity .2s;
}
.tpl-card:hover { border-color: var(--accent-3); }
.tpl-card.active {
  border-color: var(--accent);
  background: var(--accent-pale);
  box-shadow: 0 0 0 3px rgba(26,58,92,.08);
}
.tpl-card.active::before { opacity: 1; }
.tpl-thumb {
  width: 100%; height: 52px; border-radius: 5px;
  margin-bottom: 7px; overflow: hidden; position: relative;
}
.tpl-name {
  font-size: 0.7rem; font-weight: 600;
  color: var(--ink-3); letter-spacing: 0.2px;
}
.tpl-badge {
  position: absolute; top: 4px; right: 4px;
  background: var(--gold); color: var(--ink-2);
  font-size: 0.55rem; font-weight: 700;
  padding: 1px 5px; border-radius: 3px;
  letter-spacing: 0.5px; text-transform: uppercase;
}

/* Color palette */
.color-palette { display: flex; gap: 8px; flex-wrap: wrap; }
.c-swatch {
  width: 26px; height: 26px; border-radius: 50%; cursor: pointer;
  transition: all .2s; border: 2.5px solid transparent;
  position: relative;
}
.c-swatch::after {
  content: '✓'; position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  color: white; font-size: 0.65rem; font-weight: 700;
  opacity: 0; transition: opacity .15s;
}
.c-swatch.active { border-color: var(--ink); transform: scale(1.15); }
.c-swatch.active::after { opacity: 1; }

/* Form fields */
.f-row { margin-bottom: 13px; }
.f-row label {
  display: block; font-size: 0.72rem; font-weight: 600;
  color: var(--ink-3); margin-bottom: 5px;
  letter-spacing: 0.1px;
}
.f-row input, .f-row textarea, .f-row select {
  width: 100%; padding: 8px 12px;
  border: 1.5px solid var(--border);
  border-radius: 7px; font-size: 0.82rem;
  font-family: var(--font-body);
  color: var(--ink); background: var(--surface);
  transition: all .2s; resize: none;
  -webkit-appearance: none;
}
.f-row input:focus, .f-row textarea:focus, .f-row select:focus {
  outline: none; border-color: var(--accent);
  background: white; box-shadow: 0 0 0 3px rgba(26,58,92,.08);
}
.f-row textarea { min-height: 72px; resize: vertical; }
.f-row input::placeholder, .f-row textarea::placeholder { color: var(--muted); }
.f-grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

/* Nav tabs */
.ctrl-tabs {
  display: flex; background: var(--surface);
  border-bottom: 1px solid var(--border);
  overflow-x: auto; scrollbar-width: none;
}
.ctrl-tabs::-webkit-scrollbar { display: none; }
.ctrl-tab {
  flex: 1; min-width: 0; padding: 11px 4px;
  font-size: 0.7rem; font-weight: 600;
  text-align: center; cursor: pointer;
  color: var(--muted); border-bottom: 2px solid transparent;
  transition: all .2s; white-space: nowrap;
  letter-spacing: 0.3px;
}
.ctrl-tab:hover { color: var(--ink-3); background: rgba(26,58,92,.03); }
.ctrl-tab.active { color: var(--accent); border-bottom-color: var(--accent); background: white; }

/* Entry cards */
.entry-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r); padding: 14px; margin-bottom: 10px;
  position: relative; transition: all .2s;
}
.entry-card:hover { border-color: var(--accent-3); box-shadow: var(--sh-sm); }
.entry-card-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 10px;
}
.entry-card-head span {
  font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.8px; color: var(--accent);
}
.btn-remove {
  width: 22px; height: 22px; border-radius: 5px;
  background: transparent; border: 1px solid var(--border);
  color: var(--muted); cursor: pointer; font-size: 0.7rem;
  display: flex; align-items: center; justify-content: center;
  transition: all .2s;
}
.btn-remove:hover { background: #fee2e2; border-color: #fca5a5; color: var(--red); }

/* Add btn */
.btn-add {
  width: 100%; padding: 9px; border: 1.5px dashed var(--border);
  border-radius: var(--r); background: transparent; font-family: var(--font-body);
  font-size: 0.78rem; font-weight: 600; color: var(--muted);
  cursor: pointer; transition: all .2s; display: flex;
  align-items: center; justify-content: center; gap: 6px;
}
.btn-add:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-pale); }

/* Skills */
.skill-row { display: flex; gap: 8px; margin-bottom: 8px; }
.skill-row input { flex: 1; }
.skills-wrap { display: flex; flex-wrap: wrap; gap: 5px; min-height: 28px; }
.s-chip {
  display: inline-flex; align-items: center; gap: 5px;
  background: var(--accent-pale); color: var(--accent);
  border: 1px solid rgba(26,58,92,.15);
  padding: 3px 10px 3px 10px; border-radius: 20px;
  font-size: 0.72rem; font-weight: 500; cursor: pointer; transition: all .15s;
}
.s-chip:hover { background: #fee2e2; border-color: #fca5a5; color: var(--red); }
.s-chip i { font-size: 0.6rem; }

/* Bottom action bar */
.ctrl-footer {
  position: absolute; bottom: 0; left: 0; width: 360px;
  background: white; border-top: 1px solid var(--border);
  padding: 14px 20px; display: flex; gap: 10px; z-index: 10;
}
.btn-gen {
  flex: 1; padding: 11px; border: none; border-radius: 8px;
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
  color: white; font-family: var(--font-body); font-weight: 700;
  font-size: 0.85rem; cursor: pointer; transition: all .2s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  letter-spacing: 0.2px;
}
.btn-gen:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(26,58,92,.35); }
.btn-gen:active { transform: translateY(0); }
.btn-exp {
  width: 44px; height: 44px; border-radius: 8px; border: 1.5px solid var(--border);
  background: white; color: var(--ink-3); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem; transition: all .2s;
}
.btn-exp:hover { border-color: var(--gold); color: var(--gold); background: var(--gold-pale); }

/* ═══════════════════════════════════════════════
   RIGHT PANEL — PREVIEW
═══════════════════════════════════════════════ */
.prev-panel {
  flex: 1; overflow-y: auto; background: #dde2ec;
  padding: 28px 32px; display: flex; flex-direction: column; align-items: center;
  background-image: radial-gradient(rgba(26,58,92,.04) 1px, transparent 1px);
  background-size: 20px 20px;
}
.prev-panel::-webkit-scrollbar { width: 5px; }
.prev-panel::-webkit-scrollbar-thumb { background: rgba(26,58,92,.15); border-radius: 4px; }

.prev-toolbar {
  width: 100%; max-width: 780px; margin-bottom: 20px;
  display: flex; align-items: center; justify-content: space-between;
}
.prev-label {
  font-size: 0.68rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: 1.2px; color: rgba(26,58,92,.5);
  display: flex; align-items: center; gap: 8px;
}
.live-dot {
  width: 7px; height: 7px; border-radius: 50%; background: #22c55e;
  animation: pulse-dot 2s infinite;
}
@keyframes pulse-dot {
  0%,100% { box-shadow: 0 0 0 0 rgba(34,197,94,.4); }
  50% { box-shadow: 0 0 0 5px rgba(34,197,94,0); }
}
.prev-actions { display: flex; gap: 8px; }
.pabtn {
  height: 30px; padding: 0 14px; border-radius: 6px;
  font-family: var(--font-body); font-size: 0.72rem; font-weight: 600;
  cursor: pointer; transition: all .2s; display: flex; align-items: center; gap: 5px;
  border: 1.5px solid rgba(26,58,92,.2); background: white; color: var(--ink-3);
}
.pabtn:hover { border-color: var(--accent); color: var(--accent); box-shadow: var(--sh-sm); }

/* CV Paper */
#cv-paper {
  width: 100%; max-width: 780px;
  background: white;
  box-shadow: var(--sh-xl);
  min-height: 1000px;
  transition: all .35s;
  transform-origin: top center;
  border-radius: 2px;
}

/* Empty state */
.cv-empty {
  min-height: 600px; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  color: var(--muted); text-align: center; padding: 50px;
}
.cv-empty-icon {
  width: 72px; height: 72px; border-radius: 16px;
  background: var(--surface); border: 1.5px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.8rem; margin-bottom: 20px;
  color: var(--muted);
}
.cv-empty h5 { font-family: var(--font-serif); font-size: 1.3rem; font-weight: 400; color: var(--ink-3); margin-bottom: 8px; }
.cv-empty p { font-size: 0.82rem; color: var(--muted); max-width: 260px; line-height: 1.6; }

/* ═══════════════════════════════════════════════
   CV TEMPLATE: PRESTIGE (dark header, two-col)
═══════════════════════════════════════════════ */
.cv-prestige {}
.cv-prestige .cvp-head {
  background: linear-gradient(135deg, var(--cv-col, #1a3a5c) 0%, color-mix(in srgb, var(--cv-col, #1a3a5c) 80%, black 20%) 100%);
  padding: 36px 44px;
  display: flex; align-items: center; gap: 28px;
  position: relative; overflow: hidden;
}
.cv-prestige .cvp-head::before {
  content: ''; position: absolute;
  top: -40px; right: -40px; width: 200px; height: 200px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,255,255,.06) 0%, transparent 70%);
}
.cv-prestige .cvp-head::after {
  content: ''; position: absolute;
  bottom: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, var(--gold), var(--gold-light), transparent);
}
.cv-prestige .cvp-monogram {
  width: 80px; height: 80px; border-radius: 50%;
  background: rgba(255,255,255,.12);
  border: 2.5px solid rgba(255,255,255,.3);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-serif); font-size: 1.9rem; font-weight: 600;
  color: white; flex-shrink: 0; position: relative;
}
.cv-prestige .cvp-name {
  font-family: var(--font-serif); font-size: 2.2rem; font-weight: 600;
  color: white; line-height: 1.1; margin-bottom: 5px;
  letter-spacing: 0.3px;
}
.cv-prestige .cvp-role {
  font-size: 0.82rem; font-weight: 300; color: rgba(255,255,255,.7);
  letter-spacing: 2px; text-transform: uppercase;
  font-family: var(--font-body);
}
.cv-prestige .cvp-contacts {
  display: flex; flex-wrap: wrap; gap: 16px; margin-top: 14px;
}
.cv-prestige .cvp-contact-item {
  display: flex; align-items: center; gap: 6px;
  font-size: 0.75rem; color: rgba(255,255,255,.7);
}
.cv-prestige .cvp-contact-item i { font-size: 0.7rem; color: var(--gold-light); }
.cv-prestige .cvp-body {
  display: grid; grid-template-columns: 200px 1fr;
}
.cv-prestige .cvp-left {
  background: #f9fafb; border-right: 1px solid #eef0f4; padding: 26px 20px;
}
.cv-prestige .cvp-right { padding: 26px 32px; }
.cvp-sec { margin-bottom: 24px; }
.cvp-sec-title {
  font-size: 0.6rem; font-weight: 800; text-transform: uppercase;
  letter-spacing: 1.8px; color: var(--cv-col, #1a3a5c);
  margin-bottom: 12px; padding-bottom: 6px;
  border-bottom: 1.5px solid var(--cv-col, #1a3a5c);
  display: flex; align-items: center; gap: 6px;
}
.cvp-skill { margin-bottom: 8px; }
.cvp-skill-name { font-size: 0.73rem; font-weight: 500; color: var(--ink-3); margin-bottom: 4px; }
.cvp-skill-track { background: #e4e8f0; border-radius: 3px; height: 5px; overflow: hidden; }
.cvp-skill-fill { height: 5px; border-radius: 3px; background: var(--cv-col, #1a3a5c); transition: width .5s; }
.cvp-entry { margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid #f0f3f8; }
.cvp-entry:last-child { border-bottom: none; padding-bottom: 0; margin-bottom: 0; }
.cvp-entry-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
.cvp-entry-deg { font-size: 0.88rem; font-weight: 700; color: var(--ink); line-height: 1.2; }
.cvp-entry-school { font-size: 0.77rem; color: var(--cv-col, #1a3a5c); font-weight: 500; margin-top: 2px; }
.cvp-entry-date {
  font-size: 0.68rem; color: var(--muted); white-space: nowrap;
  font-family: var(--font-mono); margin-top: 2px;
}
.cvp-entry-desc { font-size: 0.78rem; color: var(--slate); line-height: 1.6; margin-top: 6px; }
.cvp-summary { font-size: 0.82rem; color: var(--slate); line-height: 1.75; font-style: italic; }
.cvp-tag {
  display: inline-block; background: white;
  border: 1px solid #e4e8f0; border-radius: 4px;
  padding: 2px 9px; font-size: 0.7rem; color: var(--ink-3);
  font-weight: 500; margin: 2px;
}
.cvp-lang-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 7px; }
.cvp-lang-name { font-size: 0.76rem; font-weight: 500; color: var(--ink-3); }
.cvp-lang-level { display: flex; gap: 3px; }
.cvp-lang-pip { width: 9px; height: 9px; border-radius: 50%; background: var(--cv-col, #1a3a5c); }
.cvp-lang-pip.off { background: #e4e8f0; }

/* ═══════════════════════════════════════════════
   CV TEMPLATE: ATELIER (dark sidebar left)
═══════════════════════════════════════════════ */
.cv-atelier { display: flex; min-height: 1000px; }
.cv-atelier .cva-sidebar {
  width: 224px; min-width: 224px;
  background: var(--cv-col, #1a3a5c);
  padding: 32px 22px; color: white;
  display: flex; flex-direction: column; gap: 0;
}
.cv-atelier .cva-mono {
  width: 72px; height: 72px; border-radius: 50%;
  background: rgba(255,255,255,.1); border: 2px solid rgba(255,255,255,.25);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-serif); font-size: 1.7rem; font-weight: 600;
  color: white; margin: 0 auto 16px;
}
.cv-atelier .cva-name {
  text-align: center; font-family: var(--font-serif);
  font-size: 1.2rem; font-weight: 600; line-height: 1.2;
}
.cv-atelier .cva-role {
  text-align: center; font-size: 0.68rem; font-weight: 300;
  opacity: .65; text-transform: uppercase; letter-spacing: 1.5px; margin-top: 5px;
}
.cva-divider { height: 1px; background: rgba(255,255,255,.12); margin: 18px 0; }
.cva-sec-title {
  font-size: 0.58rem; font-weight: 800; text-transform: uppercase;
  letter-spacing: 1.8px; opacity: .5; margin-bottom: 10px;
}
.cva-contact-item {
  display: flex; align-items: center; gap: 8px;
  font-size: 0.72rem; opacity: .8; margin-bottom: 7px; line-height: 1.3;
}
.cva-contact-item i { font-size: 0.72rem; opacity: .6; flex-shrink: 0; }
.cva-skill { margin-bottom: 8px; }
.cva-skill-name { font-size: 0.72rem; opacity: .8; margin-bottom: 4px; }
.cva-skill-bar { background: rgba(255,255,255,.12); border-radius: 3px; height: 4px; }
.cva-skill-fill { height: 4px; border-radius: 3px; background: rgba(255,255,255,.6); }
.cva-lang-item { font-size: 0.72rem; opacity: .8; margin-bottom: 5px; }
.cva-lang-item em { opacity: .55; font-style: normal; }
.cva-interest { font-size: 0.72rem; opacity: .7; line-height: 1.6; }
.cv-atelier .cva-main { flex: 1; padding: 32px 32px; }
.cva-main-sec { margin-bottom: 24px; }
.cva-main-title {
  font-family: var(--font-serif); font-size: 1.05rem; font-weight: 600;
  color: var(--cv-col, #1a3a5c); margin-bottom: 14px;
  display: flex; align-items: center; gap: 10px;
}
.cva-main-title::after {
  content: ''; flex: 1; height: 1px;
  background: linear-gradient(to right, var(--cv-col, #1a3a5c), transparent);
  opacity: .3;
}
.cva-entry {
  padding-left: 14px; border-left: 2px solid #eef0f4;
  margin-bottom: 14px; transition: border-color .2s;
}
.cva-entry:hover { border-left-color: var(--cv-col, #1a3a5c); }
.cva-entry-top { display: flex; justify-content: space-between; align-items: flex-start; }
.cva-entry-deg { font-size: 0.87rem; font-weight: 700; color: var(--ink); }
.cva-entry-school { font-size: 0.76rem; color: var(--cv-col, #1a3a5c); font-weight: 500; margin-top: 1px; }
.cva-entry-date { font-size: 0.68rem; color: var(--muted); font-family: var(--font-mono); }
.cva-entry-desc { font-size: 0.77rem; color: var(--slate); line-height: 1.6; margin-top: 5px; }
.cva-summary { font-size: 0.83rem; color: var(--slate); line-height: 1.75; }
.cva-skill-tag {
  display: inline-block; border: 1px solid var(--border);
  background: var(--surface); border-radius: 4px;
  padding: 3px 10px; font-size: 0.71rem; color: var(--ink-3);
  font-weight: 500; margin: 2px;
}

/* ═══════════════════════════════════════════════
   CV TEMPLATE: FOLIO (ultra-minimal, typographic)
═══════════════════════════════════════════════ */
.cv-folio { padding: 48px 54px; }
.cv-folio .cvf-eyebrow {
  font-size: 0.65rem; font-weight: 700; letter-spacing: 3px;
  text-transform: uppercase; color: var(--cv-col, #1a3a5c);
  margin-bottom: 8px;
}
.cv-folio .cvf-name {
  font-family: var(--font-serif); font-size: 3rem; font-weight: 300;
  color: var(--ink); line-height: 1.05; letter-spacing: -1px;
}
.cv-folio .cvf-name strong { font-weight: 700; }
.cv-folio .cvf-rule {
  height: 2px; margin: 18px 0;
  background: linear-gradient(to right, var(--cv-col, #1a3a5c), var(--border));
}
.cv-folio .cvf-contacts {
  display: flex; flex-wrap: wrap; gap: 20px; margin-bottom: 28px;
  font-size: 0.76rem; color: var(--muted);
}
.cv-folio .cvf-contacts span { display: flex; align-items: center; gap: 5px; }
.cv-folio .cvf-contacts i { color: var(--cv-col, #1a3a5c); }
.cv-folio .cvf-body { display: grid; grid-template-columns: 1fr 220px; gap: 36px; }
.cvf-sec { margin-bottom: 24px; }
.cvf-sec-title {
  font-size: 0.6rem; font-weight: 800; text-transform: uppercase;
  letter-spacing: 2px; color: var(--cv-col, #1a3a5c); margin-bottom: 12px;
}
.cvf-entry { margin-bottom: 14px; }
.cvf-entry-name { font-size: 0.88rem; font-weight: 700; color: var(--ink); }
.cvf-entry-sub { font-size: 0.77rem; color: var(--cv-col, #1a3a5c); font-weight: 500; }
.cvf-entry-date { font-size: 0.68rem; color: var(--muted); font-family: var(--font-mono); }
.cvf-entry-desc { font-size: 0.78rem; color: var(--slate); line-height: 1.6; margin-top: 4px; }
.cvf-summary { font-size: 0.83rem; color: var(--slate); line-height: 1.75; }
.cvf-skill-pill {
  display: inline-block; border-radius: 3px;
  background: var(--surface); border: 1px solid var(--border);
  padding: 3px 10px; font-size: 0.71rem; color: var(--ink-3);
  font-weight: 500; margin: 2px;
}
.cvf-lang-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 7px; }
.cvf-lang-name { font-size: 0.77rem; font-weight: 600; color: var(--ink-3); }
.cvf-lang-badge {
  font-size: 0.64rem; font-family: var(--font-mono);
  color: var(--cv-col, #1a3a5c); background: var(--accent-pale);
  padding: 1px 7px; border-radius: 3px;
}

/* ═══════════════════════════════════════════════
   PRINT
═══════════════════════════════════════════════ */
@media print {
  .topbar, .ctrl-panel, .prev-toolbar, .prev-panel > :not(#cv-paper) { display: none !important; }
  body { background: white !important; }
  .app-layout { height: auto; overflow: visible; }
  .prev-panel { padding: 0 !important; background: white !important; display: block !important; }
  #cv-paper { box-shadow: none !important; max-width: 100% !important; border-radius: 0 !important; }
}

/* Animations */
@keyframes fadeUp { from{opacity:0;transform:translateY(16px);} to{opacity:1;transform:translateY(0);} }
.anim-in { animation: fadeUp .5s ease both; }
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-brand">
    <div class="topbar-logo">CV</div>
    <div class="topbar-title">CV <span>Studio</span></div>
  </div>
  <div class="topbar-meta">CSC336 Web Technologies &nbsp;·&nbsp; Zainab Afzal &nbsp;·&nbsp; SP24-BSE-034</div>
  <div class="topbar-actions">
    <button class="tbtn tbtn-ghost" onclick="window.print()"><i class="bi bi-file-pdf"></i> Export PDF</button>
    <button class="tbtn tbtn-gold" onclick="generateCV()"><i class="bi bi-magic"></i> Generate</button>
  </div>
</div>

<div class="app-layout">

  <!-- ══════════ CONTROL PANEL ══════════ -->
  <div class="ctrl-panel">
    <div class="ctrl-panel-inner">

      <!-- Template -->
      <div class="ps">
        <div class="ps-label">Template</div>
        <div class="tpl-grid">
          <div class="tpl-card active" data-tpl="prestige" onclick="pickTemplate('prestige',this)">
            <div class="tpl-thumb" style="background:linear-gradient(135deg,#1a3a5c,#2d5f8a);">
              <div style="position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#b8973a,#d4af6a)"></div>
              <div style="padding:6px 8px;">
                <div style="height:8px;background:rgba(255,255,255,.5);border-radius:2px;width:70%;margin-bottom:3px"></div>
                <div style="height:4px;background:rgba(255,255,255,.25);border-radius:2px;width:50%"></div>
              </div>
            </div>
            <div class="tpl-name">Prestige</div>
            <div class="tpl-badge">PRO</div>
          </div>
          <div class="tpl-card" data-tpl="atelier" onclick="pickTemplate('atelier',this)">
            <div class="tpl-thumb" style="display:flex;gap:3px;padding:4px;">
              <div style="width:28%;background:#1a3a5c;border-radius:3px;height:100%"></div>
              <div style="flex:1;padding:4px 0;">
                <div style="height:5px;background:#e4e8f0;border-radius:2px;margin-bottom:3px"></div>
                <div style="height:5px;background:#e4e8f0;border-radius:2px;width:75%;margin-bottom:3px"></div>
                <div style="height:5px;background:#e4e8f0;border-radius:2px;width:55%"></div>
              </div>
            </div>
            <div class="tpl-name">Atelier</div>
          </div>
          <div class="tpl-card" data-tpl="folio" onclick="pickTemplate('folio',this)">
            <div class="tpl-thumb" style="padding:6px 8px;">
              <div style="height:3px;background:#1a3a5c;margin-bottom:4px;border-radius:1px"></div>
              <div style="height:10px;background:#1a3a5c;opacity:.12;border-radius:2px;width:80%;margin-bottom:4px"></div>
              <div style="height:1px;background:linear-gradient(to right,#1a3a5c,transparent);margin-bottom:4px"></div>
              <div style="height:4px;background:#e4e8f0;border-radius:2px;width:90%;margin-bottom:2px"></div>
              <div style="height:4px;background:#e4e8f0;border-radius:2px;width:70%"></div>
            </div>
            <div class="tpl-name">Folio</div>
          </div>
        </div>
      </div>

      <!-- Color -->
      <div class="ps">
        <div class="ps-label">Accent Color</div>
        <div class="color-palette" id="colorPalette">
          <div class="c-swatch active" style="background:#1a3a5c" data-c="#1a3a5c" onclick="pickColor(this)"></div>
          <div class="c-swatch" style="background:#14532d" data-c="#14532d" onclick="pickColor(this)"></div>
          <div class="c-swatch" style="background:#7c2d12" data-c="#7c2d12" onclick="pickColor(this)"></div>
          <div class="c-swatch" style="background:#4a1d96" data-c="#4a1d96" onclick="pickColor(this)"></div>
          <div class="c-swatch" style="background:#164e63" data-c="#164e63" onclick="pickColor(this)"></div>
          <div class="c-swatch" style="background:#78350f" data-c="#78350f" onclick="pickColor(this)"></div>
          <div class="c-swatch" style="background:#0c0f14" data-c="#0c0f14" onclick="pickColor(this)"></div>
          <div class="c-swatch" style="background:#881337" data-c="#881337" onclick="pickColor(this)"></div>
        </div>
      </div>

      <!-- Tabs -->
      <div class="ctrl-tabs">
        <div class="ctrl-tab active" onclick="goTab('personal',this)">Personal</div>
        <div class="ctrl-tab" onclick="goTab('education',this)">Education</div>
        <div class="ctrl-tab" onclick="goTab('experience',this)">Experience</div>
        <div class="ctrl-tab" onclick="goTab('skills',this)">Skills</div>
        <div class="ctrl-tab" onclick="goTab('extra',this)">Extra</div>
      </div>

      <!-- TAB: Personal -->
      <div class="tab-content" id="tab-personal">
        <div class="ps">
          <div class="f-row"><label>Full Name *</label><input id="i-name" type="text" placeholder="e.g. Zainab Afzal"/></div>
          <div class="f-row"><label>Professional Title</label><input id="i-title" type="text" placeholder="e.g. Software Engineer"/></div>
          <div class="f-grid2">
            <div class="f-row"><label>Email</label><input id="i-email" type="email" placeholder="hello@example.com"/></div>
            <div class="f-row"><label>Phone</label><input id="i-phone" type="tel" placeholder="+92 300 000 0000"/></div>
          </div>
          <div class="f-grid2">
            <div class="f-row"><label>Location</label><input id="i-loc" type="text" placeholder="Vehari, Pakistan"/></div>
            <div class="f-row"><label>LinkedIn / Web</label><input id="i-link" type="text" placeholder="linkedin.com/in/you"/></div>
          </div>
          <div class="f-row"><label>Professional Summary</label><textarea id="i-summary" placeholder="A concise overview of your background, skills, and career goals..."></textarea></div>
        </div>
      </div>

      <!-- TAB: Education -->
      <div class="tab-content" id="tab-education" style="display:none">
        <div class="ps">
          <div id="edu-list"></div>
          <button class="btn-add" onclick="addEdu()"><i class="bi bi-plus"></i> Add Education</button>
        </div>
      </div>

      <!-- TAB: Experience -->
      <div class="tab-content" id="tab-experience" style="display:none">
        <div class="ps">
          <div id="exp-list"></div>
          <button class="btn-add" onclick="addExp()"><i class="bi bi-plus"></i> Add Experience</button>
        </div>
      </div>

      <!-- TAB: Skills -->
      <div class="tab-content" id="tab-skills" style="display:none">
        <div class="ps">
          <div class="f-row">
            <label>Add Skill <span style="color:var(--muted);font-weight:400">(press Enter or click Add)</span></label>
            <div class="skill-row">
              <input id="skill-inp" type="text" placeholder="e.g. JavaScript" onkeydown="if(event.key==='Enter'){doAddSkill();event.preventDefault();}"/>
              <button class="tbtn tbtn-ghost" style="height:36px;padding:0 14px;border-radius:7px;background:var(--accent);color:white;border:none;" onclick="doAddSkill()">Add</button>
            </div>
            <div class="skills-wrap" id="skills-wrap"></div>
          </div>
          <div class="f-row" style="margin-top:16px;">
            <div class="ps-label" style="margin-bottom:10px;">Languages</div>
            <div id="lang-list"></div>
            <button class="btn-add" onclick="addLang()"><i class="bi bi-plus"></i> Add Language</button>
          </div>
        </div>
      </div>

      <!-- TAB: Extra -->
      <div class="tab-content" id="tab-extra" style="display:none">
        <div class="ps">
          <div class="f-row"><label>Certifications</label><textarea id="i-certs" placeholder="e.g. AWS Certified Developer&#10;Google UX Design Certificate"></textarea></div>
          <div class="f-row"><label>Projects</label><textarea id="i-projects" placeholder="e.g. E-Commerce Platform (React, Node.js)&#10;Portfolio Website (HTML/CSS/JS)"></textarea></div>
          <div class="f-row"><label>Hobbies &amp; Interests</label><input id="i-hobbies" type="text" placeholder="e.g. Photography, Open Source, Hiking"/></div>
        </div>
      </div>

    </div><!-- /ctrl-panel-inner -->

    <!-- Footer action bar -->
    <div class="ctrl-footer">
      <button class="btn-gen" onclick="generateCV()">
        <i class="bi bi-stars"></i> Generate CV
      </button>
      <button class="btn-exp" title="Print / Save as PDF" onclick="window.print()">
        <i class="bi bi-printer"></i>
      </button>
      <button class="btn-exp" title="Refresh Preview" onclick="generateCV()" style="border-color:var(--accent-3);color:var(--accent);">
        <i class="bi bi-arrow-clockwise"></i>
      </button>
    </div>
  </div><!-- /ctrl-panel -->

  <!-- ══════════ PREVIEW PANEL ══════════ -->
  <div class="prev-panel">
    <div class="prev-toolbar">
      <div class="prev-label"><div class="live-dot"></div> Live Preview</div>
      <div class="prev-actions">
        <button class="pabtn" onclick="generateCV()"><i class="bi bi-arrow-clockwise"></i> Refresh</button>
        <button class="pabtn" onclick="window.print()"><i class="bi bi-file-earmark-pdf"></i> Save PDF</button>
      </div>
    </div>
    <div id="cv-paper">
      <div class="cv-empty">
        <div class="cv-empty-icon"><i class="bi bi-file-person"></i></div>
        <h5>Your CV Appears Here</h5>
        <p>Fill in your details on the left panel and click <strong>Generate CV</strong> to preview</p>
      </div>
    </div>
  </div>

</div><!-- /app-layout -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
/* ── State ── */
let tpl = 'prestige', color = '#1a3a5c';
let skills = [], eduList = [], expList = [], langList = [];
let eduId = 0, expId = 0, langId = 0;

/* ── Init ── */
window.onload = () => {
  // seed demo data
  document.getElementById('i-name').value    = 'Zainab Afzal';
  document.getElementById('i-title').value   = 'Software Engineering Student';
  document.getElementById('i-email').value   = 'zainab.afzal@student.com';
  document.getElementById('i-phone').value   = '+92 300 1234567';
  document.getElementById('i-loc').value     = 'Vehari, Pakistan';
  document.getElementById('i-link').value    = 'linkedin.com/in/zainab-afzal';
  document.getElementById('i-summary').value = 'Motivated Software Engineering student at COMSATS University Islamabad with a solid grounding in web technologies and programming. Committed to delivering clean, responsive, and accessible digital experiences.';
  document.getElementById('i-hobbies').value = 'Reading, UI Design, Open Source Contribution';
  document.getElementById('i-projects').value= 'CV Generator App (HTML5, CSS3, JavaScript, Bootstrap)\nPersonal Portfolio Website (HTML/CSS/JS)';

  // seed education
  eduList.push({ id: ++eduId, deg: 'Bachelor of Software Engineering', school: 'COMSATS University Islamabad, Vehari', year: '2024 – 2028', desc: 'GPA: 3.6/4.0 · Relevant coursework: Web Technologies, OOP, DSA, Database Systems' });
  eduList.push({ id: ++eduId, deg: 'Intermediate (Pre-Engineering)', school: 'Govt College Vehari', year: '2022 – 2024', desc: '' });
  renderEduList();

  // seed experience
  expList.push({ id: ++expId, deg: 'Web Development Intern', school: 'Tech Solutions Pvt. Ltd.', year: 'Jun 2024 – Aug 2024', desc: 'Built responsive landing pages using HTML5, CSS3, and Bootstrap. Collaborated with senior developers on client projects.' });
  renderExpList();

  // seed skills
  skills = ['HTML5 / CSS3', 'JavaScript (ES6+)', 'Bootstrap 5', 'Python', 'Git & GitHub', 'Responsive Design'];
  renderSkillChips();

  // seed languages
  langList.push({ id: ++langId, lang: 'Urdu', level: 'Native' });
  langList.push({ id: ++langId, lang: 'English', level: 'Fluent' });
  renderLangList();

  generateCV();
};

/* ── Tab navigation ── */
function goTab(name, el) {
  document.querySelectorAll('.ctrl-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
  el.classList.add('active');
  document.getElementById('tab-' + name).style.display = 'block';
}

/* ── Template / Color ── */
function pickTemplate(t, el) {
  tpl = t;
  document.querySelectorAll('.tpl-card').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
}
function pickColor(el) {
  color = el.dataset.c;
  document.querySelectorAll('.c-swatch').forEach(s => s.classList.remove('active'));
  el.classList.add('active');
}

/* ── Education entries ── */
function addEdu() {
  eduList.push({ id: ++eduId, deg: '', school: '', year: '', desc: '' });
  renderEduList();
}
function removeEdu(id) { eduList = eduList.filter(e => e.id !== id); renderEduList(); }
function renderEduList() {
  document.getElementById('edu-list').innerHTML = eduList.map(e => `
    <div class="entry-card">
      <div class="entry-card-head">
        <span>Education Entry</span>
        <button class="btn-remove" onclick="removeEdu(${e.id})"><i class="bi bi-x"></i></button>
      </div>
      <div class="f-row"><input type="text" placeholder="Degree / Qualification" value="${e.deg}" oninput="eduList.find(x=>x.id==${e.id}).deg=this.value"/></div>
      <div class="f-row"><input type="text" placeholder="Institution Name" value="${e.school}" oninput="eduList.find(x=>x.id==${e.id}).school=this.value"/></div>
      <div class="f-row"><input type="text" placeholder="Years (e.g. 2022–2026)" value="${e.year}" oninput="eduList.find(x=>x.id==${e.id}).year=this.value"/></div>
      <div class="f-row"><textarea placeholder="GPA, achievements, relevant courses..." oninput="eduList.find(x=>x.id==${e.id}).desc=this.value">${e.desc}</textarea></div>
    </div>`).join('');
}

/* ── Experience entries ── */
function addExp() {
  expList.push({ id: ++expId, deg: '', school: '', year: '', desc: '' });
  renderExpList();
}
function removeExp(id) { expList = expList.filter(e => e.id !== id); renderExpList(); }
function renderExpList() {
  document.getElementById('exp-list').innerHTML = expList.map(e => `
    <div class="entry-card">
      <div class="entry-card-head">
        <span>Experience Entry</span>
        <button class="btn-remove" onclick="removeExp(${e.id})"><i class="bi bi-x"></i></button>
      </div>
      <div class="f-row"><input type="text" placeholder="Job Title / Role" value="${e.deg}" oninput="expList.find(x=>x.id==${e.id}).deg=this.value"/></div>
      <div class="f-row"><input type="text" placeholder="Company / Organization" value="${e.school}" oninput="expList.find(x=>x.id==${e.id}).school=this.value"/></div>
      <div class="f-row"><input type="text" placeholder="Period (e.g. Jun 2023 – Present)" value="${e.year}" oninput="expList.find(x=>x.id==${e.id}).year=this.value"/></div>
      <div class="f-row"><textarea placeholder="Key responsibilities and achievements..." oninput="expList.find(x=>x.id==${e.id}).desc=this.value">${e.desc}</textarea></div>
    </div>`).join('');
}

/* ── Skills ── */
function doAddSkill() {
  const inp = document.getElementById('skill-inp');
  const v = inp.value.trim();
  if (v && !skills.includes(v)) { skills.push(v); renderSkillChips(); }
  inp.value = '';
}
function removeSkill(s) { skills = skills.filter(x => x !== s); renderSkillChips(); }
function renderSkillChips() {
  document.getElementById('skills-wrap').innerHTML = skills.map(s =>
    `<div class="s-chip" onclick="removeSkill('${s}')">${s}<i class="bi bi-x-circle-fill"></i></div>`
  ).join('');
}

/* ── Languages ── */
function addLang() {
  langList.push({ id: ++langId, lang: '', level: 'Intermediate' });
  renderLangList();
}
function removeLang(id) { langList = langList.filter(l => l.id !== id); renderLangList(); }
function renderLangList() {
  document.getElementById('lang-list').innerHTML = langList.map(l => `
    <div class="entry-card" style="padding:10px 12px;margin-bottom:8px;">
      <div style="display:flex;gap:8px;align-items:center;">
        <input type="text" style="flex:1;padding:7px 10px;border:1.5px solid var(--border);border-radius:6px;font-size:.8rem;font-family:var(--font-body);background:white;" placeholder="Language" value="${l.lang}" oninput="langList.find(x=>x.id==${l.id}).lang=this.value"/>
        <select style="width:130px;padding:7px 10px;border:1.5px solid var(--border);border-radius:6px;font-size:.78rem;font-family:var(--font-body);background:white;-webkit-appearance:none;" oninput="langList.find(x=>x.id==${l.id}).level=this.value">
          ${['Basic','Intermediate','Fluent','Native'].map(o=>`<option${l.level===o?' selected':''}>${o}</option>`).join('')}
        </select>
        <button class="btn-remove" onclick="removeLang(${l.id})"><i class="bi bi-x"></i></button>
      </div>
    </div>`).join('');
}

/* ── Helpers ── */
function initials(name) { return name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase() || 'CV'; }
function skillW(s) { const map={'HTML5 / CSS3':85,'JavaScript (ES6+)':80,'Bootstrap 5':82,'Python':72,'Git & GitHub':75,'Responsive Design':80}; return map[s] || 68; }
function langPips(level, col) {
  const n = {Basic:1,Intermediate:2,Fluent:3,Native:4}[level]||2;
  return Array.from({length:4},(_,i)=>`<div class="cvp-lang-pip${i>=n?' off':''}"></div>`).join('');
}

/* ═══════════ GENERATE ═══════════ */
function generateCV() {
  const name    = document.getElementById('i-name').value.trim() || 'Your Name';
  const title   = document.getElementById('i-title').value.trim();
  const email   = document.getElementById('i-email').value.trim();
  const phone   = document.getElementById('i-phone').value.trim();
  const loc     = document.getElementById('i-loc').value.trim();
  const link    = document.getElementById('i-link').value.trim();
  const summary = document.getElementById('i-summary').value.trim();
  const certs   = document.getElementById('i-certs').value.trim();
  const projects= document.getElementById('i-projects').value.trim();
  const hobbies = document.getElementById('i-hobbies').value.trim();

  const paper = document.getElementById('cv-paper');
  paper.className = '';
  paper.style.setProperty('--cv-col', color);

  if (tpl === 'prestige')    renderPrestige(paper, {name,title,email,phone,loc,link,summary,certs,projects,hobbies});
  else if (tpl === 'atelier')renderAtelier(paper,  {name,title,email,phone,loc,link,summary,certs,projects,hobbies});
  else                       renderFolio(paper,    {name,title,email,phone,loc,link,summary,certs,projects,hobbies});
}

/* ══ TEMPLATE: PRESTIGE ══ */
function renderPrestige(p, d) {
  const contacts = [
    d.email ? `<div class="cvp-contact-item"><i class="bi bi-envelope"></i>${d.email}</div>` : '',
    d.phone ? `<div class="cvp-contact-item"><i class="bi bi-telephone"></i>${d.phone}</div>` : '',
    d.loc   ? `<div class="cvp-contact-item"><i class="bi bi-geo-alt"></i>${d.loc}</div>` : '',
    d.link  ? `<div class="cvp-contact-item"><i class="bi bi-link-45deg"></i>${d.link}</div>` : '',
  ].filter(Boolean).join('');

  const skillsHTML = skills.map(s => `
    <div class="cvp-skill">

    </div>`).join('') || '<span style="font-size:.75rem;color:var(--muted)">No skills added yet</span>';

  const langsHTML = langList.filter(l=>l.lang).map(l => `
    <div class="cvp-lang-row">
      <span class="cvp-lang-name">${l.lang}</span>
      <div class="cvp-lang-level">${langPips(l.level,color)}</div>
    </div>`).join('');

  const eduHTML = eduList.filter(e=>e.deg||e.school).map(e => `
    <div class="cvp-entry">
      <div class="cvp-entry-top">
        <div><div class="cvp-entry-deg">${e.deg}</div><div class="cvp-entry-school">${e.school}</div></div>
        <div class="cvp-entry-date">${e.year}</div>
      </div>
      ${e.desc?`<div class="cvp-entry-desc">${e.desc}</div>`:''}
    </div>`).join('') || '<span style="font-size:.78rem;color:var(--muted)">No education added</span>';

  const expHTML = expList.filter(e=>e.deg||e.school).map(e => `
    <div class="cvp-entry">
      <div class="cvp-entry-top">
        <div><div class="cvp-entry-deg">${e.deg}</div><div class="cvp-entry-school">${e.school}</div></div>
        <div class="cvp-entry-date">${e.year}</div>
      </div>
      ${e.desc?`<div class="cvp-entry-desc">${e.desc}</div>`:''}
    </div>`).join('');

  const projHTML = d.projects ? d.projects.split('\n').filter(Boolean).map(p=>
    `<div class="cvp-entry-desc" style="margin-bottom:5px;">▸ ${p}</div>`).join('') : '';

  const certHTML = d.certs ? `<div class="cvp-entry-desc">${d.certs.split('\n').filter(Boolean).join(' · ')}</div>` : '';

  p.className = 'cv-prestige anim-in';
  p.innerHTML = `
    <div class="cvp-head">
      <div class="cvp-monogram">${initials(d.name)}</div>
      <div>
        <div class="cvp-name">${d.name}</div>
        ${d.title?`<div class="cvp-role">${d.title}</div>`:''}
        <div class="cvp-contacts">${contacts}</div>
      </div>
    </div>
    <div class="cvp-body">
      <div class="cvp-left">
        ${skills.length?`<div class="cvp-sec"><div class="cvp-sec-title">Skills</div>${skillsHTML}</div>`:''}
        ${langsHTML?`<div class="cvp-sec"><div class="cvp-sec-title">Languages</div>${langsHTML}</div>`:''}
        ${d.hobbies?`<div class="cvp-sec"><div class="cvp-sec-title">Interests</div><div class="cvp-entry-desc">${d.hobbies}</div></div>`:''}
      </div>
      <div class="cvp-right">
        ${d.summary?`<div class="cvp-sec"><div class="cvp-sec-title">Summary</div><div class="cvp-summary">${d.summary}</div></div>`:''}
        <div class="cvp-sec"><div class="cvp-sec-title">Education</div>${eduHTML}</div>
        ${expHTML?`<div class="cvp-sec"><div class="cvp-sec-title">Experience</div>${expHTML}</div>`:''}
        ${projHTML?`<div class="cvp-sec"><div class="cvp-sec-title">Projects</div>${projHTML}</div>`:''}
        ${certHTML?`<div class="cvp-sec"><div class="cvp-sec-title">Certifications</div>${certHTML}</div>`:''}
      </div>
    </div>`;
}

/* ══ TEMPLATE: FOLIO ══ */
function renderFolio(p, d) {
  const nameParts = d.name.trim().split(' ');
  const first = nameParts.slice(0,-1).join(' ');
  const last = nameParts[nameParts.length-1];
  const displayName = nameParts.length > 1 ? `${first} <strong>${last}</strong>` : `<strong>${d.name}</strong>`;

  const contacts = [
    d.email?`<span><i class="bi bi-envelope"></i>${d.email}</span>`:'',
    d.phone?`<span><i class="bi bi-telephone"></i>${d.phone}</span>`:'',
    d.loc?`<span><i class="bi bi-geo-alt"></i>${d.loc}</span>`:'',
    d.link?`<span><i class="bi bi-link-45deg"></i>${d.link}</span>`:'',
  ].filter(Boolean).join('');

  const eduHTML = eduList.filter(e=>e.deg||e.school).map(e=>`
    <div class="cvf-entry">
      <div class="cvf-entry-name">${e.deg}</div>
      <div class="cvf-entry-sub">${e.school}</div>
      <div class="cvf-entry-date">${e.year}</div>
      ${e.desc?`<div class="cvf-entry-desc">${e.desc}</div>`:''}
    </div>`).join('') || '<span style="font-size:.78rem;color:var(--muted)">No education added</span>';

  const expHTML = expList.filter(e=>e.deg||e.school).map(e=>`
    <div class="cvf-entry">
      <div class="cvf-entry-name">${e.deg}</div>
      <div class="cvf-entry-sub">${e.school}</div>
      <div class="cvf-entry-date">${e.year}</div>
      ${e.desc?`<div class="cvf-entry-desc">${e.desc}</div>`:''}
    </div>`).join('');

  const skillPills = skills.map(s=>`<span class="cvf-skill-pill">${s}</span>`).join('');
  const langsHTML = langList.filter(l=>l.lang).map(l=>`
    <div class="cvf-lang-item">
      <span class="cvf-lang-name">${l.lang}</span>
      <span class="cvf-lang-badge">${l.level.toUpperCase()}</span>
    </div>`).join('');

  const projHTML = d.projects ? d.projects.split('\n').filter(Boolean).map(p=>
    `<div class="cvf-entry-desc" style="margin-bottom:4px;">▸ ${p}</div>`).join('') : '';

  p.className = 'cv-folio anim-in';
  p.innerHTML = `
    ${d.title?`<div class="cvf-eyebrow">${d.title}</div>`:''}
    <div class="cvf-name">${displayName}</div>
    <div class="cvf-rule"></div>
    <div class="cvf-contacts">${contacts}</div>
    <div class="cvf-body">
      <div>
        ${d.summary?`<div class="cvf-sec"><div class="cvf-sec-title">Profile</div><div class="cvf-summary">${d.summary}</div></div>`:''}
        <div class="cvf-sec"><div class="cvf-sec-title">Education</div>${eduHTML}</div>
        ${expHTML?`<div class="cvf-sec"><div class="cvf-sec-title">Experience</div>${expHTML}</div>`:''}
        ${projHTML?`<div class="cvf-sec"><div class="cvf-sec-title">Projects</div>${projHTML}</div>`:''}
      </div>
      <div>
        ${skillPills?`<div class="cvf-sec"><div class="cvf-sec-title">Skills</div>${skillPills}</div>`:''}
        ${langsHTML?`<div class="cvf-sec"><div class="cvf-sec-title">Languages</div>${langsHTML}</div>`:''}
        ${d.certs?`<div class="cvf-sec"><div class="cvf-sec-title">Certifications</div><div class="cvf-entry-desc">${d.certs}</div></div>`:''}
        ${d.hobbies?`<div class="cvf-sec"><div class="cvf-sec-title">Interests</div><div class="cvf-entry-desc">${d.hobbies}</div></div>`:''}
      </div>
    </div>`;
}
